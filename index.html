<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Solaris Atlas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <button id="mobileHudToggle" class="mobile-hud-toggle" type="button" aria-expanded="true">收起面板</button>
      <aside class="hud glass">
        <div class="brand">
          <p class="eyebrow">Interactive Orrery</p>
          <h1>Solaris Atlas</h1>
          <p class="subtitle">可自由飞行、时间驱动、可着陆的精细 3D 太阳系</p>
        </div>

        <section class="status-banner" id="cursorHint">
          鼠标未锁定：点击右侧宇宙画面后即可隐藏光标并自由观察，按 `Esc` 恢复光标。
        </section>

        <section class="panel">
          <label>
            <span>时间</span>
            <input id="dateInput" type="datetime-local" />
          </label>
          <label>
            <span>时间流速</span>
            <input id="timeScale" type="range" min="-2000" max="2000" value="1" step="1" />
            <output id="timeScaleValue">1x</output>
          </label>
          <div class="button-row">
            <button id="pauseBtn" type="button">暂停时间</button>
            <button id="nowBtn" type="button">回到现在</button>
          </div>
        </section>

        <section class="panel">
          <label>
            <span>飞行速度</span>
            <input id="moveSpeed" type="range" min="1" max="400" value="30" step="1" />
            <output id="moveSpeedValue">30</output>
          </label>
          <label>
            <span>目标天体</span>
            <select id="bodySelect"></select>
          </label>
          <div class="button-row">
            <button id="focusBtn" type="button">观察目标</button>
            <button id="landBtn" type="button">降落到表面</button>
          </div>
          <div class="button-row">
            <button id="toggleLabelsBtn" class="secondary" type="button">隐藏名称</button>
            <button id="toggleOrbitsBtn" class="secondary" type="button">隐藏轨道</button>
          </div>
          <div class="button-row">
            <button id="resetCameraBtn" class="secondary" type="button">重置相机</button>
          </div>
        </section>

        <section class="panel compact">
          <h2>操作</h2>
          <p>桌面端可点击画面锁定鼠标视角，WASD 平移，E/Q 或 R/F 升降，Shift 加速，Ctrl 微调。</p>
          <p>移动端支持单指旋转视角、双指缩放前后移动，虚拟方向键控制 AD / RF，轻点天体可选中目标。</p>
          <p>点击或轻点天体即可选中；观察目标会飞到附近，降落会贴附到表面并跟随天体运动。</p>
        </section>

        <section class="panel compact info-panel">
          <h2 id="infoName">Sun</h2>
          <p id="infoText">载入中...</p>
        </section>
      </aside>

      <div class="mobile-flight-pad" id="mobileFlightPad" aria-label="移动端飞行方向键">
        <button class="flight-key flight-key-up" data-move-axis="up" data-move-value="1" type="button">R</button>
        <button class="flight-key flight-key-left" data-move-axis="right" data-move-value="-1" type="button">A</button>
        <button class="flight-key flight-key-right" data-move-axis="right" data-move-value="1" type="button">D</button>
        <button class="flight-key flight-key-down" data-move-axis="up" data-move-value="-1" type="button">F</button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
